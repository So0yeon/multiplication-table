<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>구구단 코인 3D 블록 꾸미기</title>
  
  <!-- Font Awesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Custom Stylesheets -->
  <link rel="stylesheet" href="style.css">

  <!-- Core Libraries from CDN -->
  <!-- Three.js (r128) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <!-- OrbitControls -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
  <!-- Canvas Confetti for celebrations -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>

  <div id="toast">메시지</div>

  <div id="app-container">
    <!-- Header -->
    <header>
      <div class="logo">
        <i class="fa-solid fa-shapes"></i>
        <span>구구단 3D 아일랜드</span>
      </div>

      <div class="stats-container">
        <div class="stat-badge" id="coin-badge">
          <i class="fa-solid fa-coins coin-icon"></i>
          <span id="coin-count">100</span> 코인
        </div>
      </div>

      <div class="header-buttons">
        <button id="btn-save-img" class="btn-header">
          <i class="fa-solid fa-camera"></i> 사진 찍기 (저장)
        </button>
        <button id="btn-reset" class="btn-header" style="color: #ff7ebb;">
          <i class="fa-solid fa-trash-can"></i> 새로 시작
        </button>
      </div>
    </header>

    <!-- Left Sidebar: Quiz Area -->
    <aside class="sidebar">
      <div class="panel-card quiz-card">
        <h2 class="panel-title">
          <i class="fa-solid fa-brain"></i>
          구구단 퀴즈방
        </h2>
        <p style="font-size: 0.9rem; color: var(--text-muted);">정답을 맞추면 블록 구매용 코인을 줍니다!</p>
        
        <div id="quiz-question" class="quiz-question">7 × 8 = ?</div>
        
        <div id="quiz-options" class="quiz-options">
          <!-- Dynamically populated buttons -->
        </div>

        <div id="combo-text" class="combo-text"></div>
      </div>

      <!-- Information/Tutorial Card -->
      <div class="panel-card" style="margin-top: auto;">
        <h3 class="panel-title" style="font-size: 1.1rem; color: var(--color-primary);">
          <i class="fa-solid fa-circle-info"></i>
          놀이 가이드
        </h3>
        <ul style="font-size: 0.85rem; line-height: 1.5; color: var(--text-muted); list-style: none; display: flex; flex-direction: column; gap: 8px;">
          <li><i class="fa-solid fa-check" style="color: var(--color-secondary);"></i> 구구단을 풀어 코인을 모아요.</li>
          <li><i class="fa-solid fa-check" style="color: var(--color-secondary);"></i> 상점에서 3D 블록을 잠금 해제해요.</li>
          <li><i class="fa-solid fa-check" style="color: var(--color-secondary);"></i> 하단 도구함에서 <strong>설치</strong> 모드를 켭니다.</li>
          <li><i class="fa-solid fa-check" style="color: var(--color-secondary);"></i> 마우스로 하늘색 격자 판을 클릭하여 설치!</li>
          <li><i class="fa-solid fa-check" style="color: var(--color-secondary);"></i> 화면은 <strong>보기</strong> 모드나 마우스 오른쪽 드래그로 둘러볼 수 있어요.</li>
        </ul>
      </div>
    </aside>

    <!-- Center: 3D Viewport -->
    <main id="canvas-container">
      <!-- Floating Tutorial info inside the scene -->
      <div id="tutorial-overlay">
        <h4><i class="fa-solid fa-wand-magic-sparkles"></i> 3D 조작 방법</h4>
        <div><i class="fa-solid fa-arrows-to-eye"></i><span>화면 돌려보기: 드래그하기</span></div>
        <div><i class="fa-solid fa-magnifying-glass-plus"></i><span>가깝게/멀리: 휠 굴리기</span></div>
        <div><i class="fa-solid fa-arrows-up-down-left-right"></i><span>화면 밀기: Ctrl + 드래그</span></div>
      </div>

      <!-- Floating Build Toolbar overlay -->
      <div class="build-overlay">
        <div class="tool-group">
          <!-- View / Rotate Camera -->
          <button class="tool-btn active" data-mode="view" title="보기">
            <i class="fa-solid fa-eye"></i><span>보기</span>
          </button>
          <!-- Build Block -->
          <button class="tool-btn" data-mode="build" title="짓기">
            <i class="fa-solid fa-hammer"></i><span>짓기</span>
          </button>
          <!-- Paint Block -->
          <button class="tool-btn" data-mode="paint" title="칠하기">
            <i class="fa-solid fa-paint-brush"></i><span>칠하기</span>
          </button>
          <!-- Erase Block -->
          <button class="tool-btn" data-mode="erase" title="지우기">
            <i class="fa-solid fa-eraser"></i><span>지우기</span>
          </button>
        </div>

        <div class="tool-group" style="padding-left: 5px;">
          <div class="color-picker" id="color-picker">
            <!-- Dynamically populated color dots -->
          </div>
        </div>
      </div>
    </main>

    <!-- Right Sidebar: Shop/Blocks Area -->
    <aside class="sidebar right-sidebar">
      <div class="panel-card" style="flex: 1; display: flex; flex-direction: column;">
        <h2 class="panel-title">
          <i class="fa-solid fa-store"></i>
          블록 상점
        </h2>
        <div class="info-row">
          <span>배치한 총 블록 수:</span>
          <span id="blocks-count" style="color: var(--color-secondary); font-weight: bold;">0</span>
        </div>
        
        <div id="shop-grid" class="shop-grid">
          <!-- Dynamically populated shop items -->
        </div>
      </div>
    </aside>
  </div>

  <!-- Custom Scripts -->
  <script src="quiz.js"></script>
  <script src="world.js"></script>
  <script src="app.js"></script>
</body>
</html>
